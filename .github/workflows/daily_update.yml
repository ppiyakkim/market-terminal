name: Daily Market Data Fetch

on:
  schedule:
    # Runs at 23:00 UTC daily (after US market close + 30min buffer)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:   # Allow manual trigger

permissions:
  contents: write      # Needed to push JSON files back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run data fetcher
        run: python scripts/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: daily market data update $(date -u '+%Y-%m-%d')"
          git push
